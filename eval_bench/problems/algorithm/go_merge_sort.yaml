id: algo_go_merge_sort
category: algorithm
lang: go
title: "병합 정렬 (Merge Sort)"
prompt: |
  반드시 Go 언어로만 작성하라. package main 으로 시작하는 완전한 Go 프로그램을 작성하라.
  표준입력으로 공백으로 구분된 정수 배열을 받아 병합 정렬로 오름차순 정렬 후 출력하라.
  내장 sort 패키지를 사용하지 말고 직접 구현해야 한다.

  입력: 5 2 4 6 1 3
  출력: 1 2 3 4 5 6
test_cases:
  - input: "5 2 4 6 1 3"
    output: "1 2 3 4 5 6"
  - input: "3 1"
    output: "1 3"
  - input: "42"
    output: "42"
  - input: "9 8 7 6 5 4 3 2 1"
    output: "1 2 3 4 5 6 7 8 9"
timeout_sec: 15
tags: [sorting, divide_and_conquer]
