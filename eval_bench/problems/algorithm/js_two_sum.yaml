id: algo_js_two_sum
category: algorithm
lang: javascript
title: "Two Sum"
prompt: |
  표준입력으로 첫째 줄에 공백으로 구분된 정수 배열, 둘째 줄에 target을 받는다.
  합이 target이 되는 두 수의 인덱스를 오름차순으로 공백 구분하여 출력하라.
  정답은 정확히 하나 존재한다.

  입력:
  2 7 11 15
  9

  출력:
  0 1
test_cases:
  - input: "2 7 11 15\n9"
    output: "0 1"
  - input: "3 2 4\n6"
    output: "1 2"
  - input: "3 3\n6"
    output: "0 1"
timeout_sec: 10
tags: [hash_map, arrays]
