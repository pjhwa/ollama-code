id: algo_py_fibonacci
category: algorithm
lang: python
title: "피보나치 수열"
prompt: |
  표준입력으로 정수 n을 받아 피보나치 수열의 n번째 값을 출력하라.
  (0-indexed: fib(0)=0, fib(1)=1, fib(10)=55)
test_cases:
  - input: "0"
    output: "0"
  - input: "1"
    output: "1"
  - input: "10"
    output: "55"
  - input: "30"
    output: "832040"
timeout_sec: 10
tags: [dynamic_programming]
