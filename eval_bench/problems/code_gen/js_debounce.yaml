id: gen_js_debounce
category: code_gen
lang: javascript
title: "Debounce 함수 구현"
prompt: |
  JavaScript로 debounce(fn, delay) 함수를 구현하고, 아래 테스트 코드를 포함한
  완전한 JavaScript 프로그램을 작성하라. 프로그램을 실행하면 정확히 "3"이 출력되어야 한다.

  반드시 다음 테스트 코드를 그대로 포함하라:

  const log = [];
  const debounced = debounce((x) => log.push(x), 50);
  debounced(1);
  debounced(2);
  debounced(3);
  setTimeout(() => {
    console.log(log.join(','));
  }, 200);

  기대 출력: 3
test_cases:
  - input: ""
    output: "3"
timeout_sec: 10
tags: [closures, async]
