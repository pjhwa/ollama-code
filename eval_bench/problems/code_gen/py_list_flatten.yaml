id: gen_py_list_flatten
category: code_gen
lang: python
title: "중첩 리스트 평탄화"
prompt: |
  표준입력으로 JSON 배열(중첩 가능)을 받아 평탄화(flatten)한 결과를
  공백으로 구분하여 출력하라.

  입력: [[1, [2, 3]], [4, [5, [6]]]]
  출력: 1 2 3 4 5 6
test_cases:
  - input: "[[1, [2, 3]], [4, [5, [6]]]]"
    output: "1 2 3 4 5 6"
  - input: "[1, 2, 3]"
    output: "1 2 3"
  - input: "[[[[1]]]]"
    output: "1"
timeout_sec: 10
tags: [recursion, lists]
