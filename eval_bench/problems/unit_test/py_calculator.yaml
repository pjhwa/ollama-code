id: test_py_calculator
category: unit_test
lang: python
title: "Calculator 유닛테스트 작성"
prompt: |
  아래 Calculator 클래스에 대한 완전한 pytest 테스트를 작성하라.
  add, subtract, multiply, divide를 테스트하고,
  0으로 나누기 시 ZeroDivisionError 발생도 테스트하라.

  ```python
  class Calculator:
      def add(self, a, b): return a + b
      def subtract(self, a, b): return a - b
      def multiply(self, a, b): return a * b
      def divide(self, a, b):
          if b == 0: raise ZeroDivisionError("division by zero")
          return a / b
  ```

  위 클래스를 포함한 완전한 Python 스크립트를 작성하라.
  assert를 직접 사용하고, ZeroDivisionError는 try/except로 확인하라.
  모든 테스트가 통과하면 print("PASS")를 출력하라.
test_cases:
  - input: ""
    output: "PASS"
timeout_sec: 30
tags: [testing, oop]
